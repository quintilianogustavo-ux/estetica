<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<title>Agendamento</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<a href="index.html">⬅ Voltar</a>
<h1>Agendamento</h1>

<div class="agendamento-container">

<div class="agendamento-img">
<img src="https://images.unsplash.com/photo-1542362567-b07e54358753" alt="Agendamento">
</div>

<form onsubmit="confirmarAgendamento(event)">

<label>Nome</label>
<input type="text" required>

<label>Telefone</label>
<input type="tel" required>

<label>Data</label>
<input type="date" id="data" required>

<label>Horário</label>
<input type="time" required>

<label>Modelo do Carro</label>
<input type="text" required>

<label>Serviço:</label>

<select required>

<option value="">Selecione</option>
<option>Polimento</option>
<option>Enceramento</option>
<option>Higienização Interna</option>
<option>Vitrificação</option>
<option>Cristalização da Pintura</option>
<option>Estética de Rodas e Pneus</option>
<option>Suporte técnico</option>
<option>Manutenção</option>
<option>Consultoria</option>
<option>Lavagem completa</option>

</select>

<button type="submit">Confirmar Agendamento</button>

</form>

</div>

<script>

function confirmarAgendamento(event) {

event.preventDefault()

alert("Agendamento realizado com sucesso ✔️!")

window.location.href = "index.html"

}

const hoje = new Date().toISOString().split("T")[0]
document.getElementById("data").setAttribute("min", hoje)

</script>

</body>
</html>
